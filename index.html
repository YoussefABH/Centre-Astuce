<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Centre Astuces - Plateforme multi-rôles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0B0F1C; color: #E2E8F0; padding-bottom: 85px; }
        :root { --bg-card: #111827; --border: #1F2A40; --primary: #6366F1; --secondary: #8B5CF6; --danger: #EF4444; --success: #10B981; --text-secondary: #94A3B8; }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 10% 20%, rgba(99,102,241,0.2) 0%, #0B0F1C 90%); padding: 1rem; }
        .auth-card { background: var(--bg-card); border-radius: 2rem; padding: 2rem; width: 100%; max-width: 440px; border: 1px solid var(--border); }
        .app-container { display: none; max-width: 1400px; margin: 0 auto; padding: 1rem 1rem 5rem; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 0.6rem 0.2rem; border-top: 1px solid var(--border); z-index: 1000; overflow-x: auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent; border: none; color: var(--text-secondary); font-size: 0.65rem; cursor: pointer; padding: 0.4rem 0.6rem; border-radius: 2rem; white-space: nowrap; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: var(--primary); background: rgba(99, 102, 241, 0.2); }
        .panel { display: none; animation: fadeSlide 0.2s ease; }
        .panel.active-panel { display: block; }
        @keyframes fadeSlide { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .card { background: var(--bg-card); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 0.6rem 1.3rem; border-radius: 2rem; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #b91c1c); }
        .btn-sm { padding: 0.35rem 1rem; font-size: 0.75rem; }
        input, select, textarea { background: #0F172A; border: 1px solid var(--border); border-radius: 1rem; padding: 0.7rem 1rem; color: white; width: 100%; margin-top: 0.25rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1E293B; color: white; padding: 0.7rem 1.5rem; border-radius: 3rem; z-index: 2000; border-left: 4px solid var(--primary); font-size: 0.85rem; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .table-wrapper { overflow-x: auto; border-radius: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem 0.6rem; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.85rem; }
        th { color: var(--text-secondary); background: rgba(15, 23, 42, 0.5); }
        tr:hover td { background: rgba(99, 102, 241, 0.05); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: var(--bg-card); border-radius: 1.5rem; padding: 1.5rem; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
        .stat-number { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #FFF, var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .notification-icon { position: relative; cursor: pointer; margin-right: 1rem; }
        .notification-badge { position: absolute; top: -8px; right: -8px; background: var(--danger); border-radius: 50%; width: 12px; height: 12px; display: none; }
        #map { height: 250px; border-radius: 1rem; margin-top: 0.5rem; }
        @media (max-width: 640px) { .nav-item span { display: none; } .nav-item i { font-size: 1.5rem; } .btn { padding: 0.5rem 1rem; } }
    </style>
</head>
<body>
<div id="authWrapper" class="auth-container"></div>
<div id="appContainer" class="app-container"></div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, initializeFirestore, persistentLocalCache, collection, doc, setDoc, getDocs, getDoc, deleteDoc, updateDoc, writeBatch } from "firebase/firestore";

    // ========== 🔥 CONFIGURATION FIREBASE (À REMPLACER) ==========
    const firebaseConfig = {
  apiKey: "AIzaSyBuCpcHui188EL9O2g2no1f36NSBb-Hfig",
  authDomain: "centre-astuces.firebaseapp.com",
  projectId: "centre-astuces",
  storageBucket: "centre-astuces.firebasestorage.app",
  messagingSenderId: "477248068455",
  appId: "1:477248068455:web:14861a2ea11a059878edc2"
};
    // ============================================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });

    let currentUser = null, activeYearId = null, yearsList = [], currentChart = null;
    let currentUserRole = "centre";
    let currentCentreId = null;
    let map = null, marker = null;

    function showToast(msg, type = "info") { let t = document.querySelector('.toast'); if (t) t.remove(); let div = document.createElement('div'); div.className = 'toast'; div.innerText = msg; if (type === 'error') div.style.borderLeftColor = '#EF4444'; document.body.appendChild(div); setTimeout(() => div.remove(), 3000); }
    function loading(show = true) { let l = document.getElementById('loader'); if (!l && show) { let d = document.createElement('div'); d.id = 'loader'; d.className = 'loading-overlay'; d.innerHTML = '<div class="card">Chargement...</div>'; document.body.appendChild(d); } else if (l && !show) l.remove(); }
    function getYearRef() { if (!currentUser || !activeYearId) return null; return doc(db, `centres/${currentCentreId || currentUser.uid}/years/${activeYearId}`); }
    function getSubCol(name) { return collection(getYearRef(), name); }

    // Data getters (pour centre)
    async function getStudents() { if (!activeYearId) return []; const snap = await getDocs(getSubCol('eleves')); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getParents() { if (!activeYearId) return []; const snap = await getDocs(getSubCol('parents')); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getPayments() { if (!activeYearId) return []; const snap = await getDocs(getSubCol('paiements')); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getProfs() { if (!activeYearId) return []; const snap = await getDocs(getSubCol('profs')); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getExpenses() { if (!activeYearId) return []; const snap = await getDocs(getSubCol('depenses')); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getSessions(profId) { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/years/${activeYearId}/profs/${profId}/sessions`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getReservations() { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/reservations`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getInvoices() { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/invoices`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getAttendance() { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/attendance`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getNotes() { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/notes`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getParentAccounts() { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/parentAccounts`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getNotifications() { const snap = await getDocs(collection(db, `centres/${currentCentreId || currentUser.uid}/notifications`)); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }

    async function addNotification(message) { await setDoc(doc(collection(db, `centres/${currentCentreId || currentUser.uid}/notifications`)), { message, date: new Date(), read: false }); updateNotificationBadge(); }
    async function updateNotificationBadge() { const notifs = await getNotifications(); const unread = notifs.filter(n => !n.read).length; const badge = document.getElementById('notifBadge'); if (badge) badge.style.display = unread ? "block" : "none"; }

    // Gestion des années
    async function loadYearsAndActive() {
        if (!currentUser) return;
        loading(true);
        const centreId = currentCentreId || currentUser.uid;
        const yearsCol = collection(db, `centres/${centreId}/years`);
        const snap = await getDocs(yearsCol);
        yearsList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const active = yearsList.find(y => y.active === true);
        if (active) activeYearId = active.id;
        else if (yearsList.length) { activeYearId = yearsList[0].id; await setDoc(doc(db, `centres/${centreId}/years/${activeYearId}`), { active: true, name: yearsList[0].name }, { merge: true }); }
        else activeYearId = null;
        const label = document.getElementById('activeYearLabel');
        if (label) label.innerText = activeYearId ? (yearsList.find(y => y.id === activeYearId)?.name || 'Année') : 'Aucune';
        loading(false);
        if (currentUserRole === 'centre' && document.querySelector('.nav-item.active')) refreshCurrentPanel();
        else if (currentUserRole === 'parent') renderParentDashboard();
        else if (currentUserRole === 'student') renderStudentDashboard();
        else if (currentUserRole === 'superadmin') renderSuperAdminDashboard();
    }
    async function openYearModal() { if (currentUserRole !== 'centre') return; let name = prompt("Nom année scolaire (ex: 2024-2025)"); if (!name) return; loading(true); const centreId = currentCentreId || currentUser.uid; await setDoc(doc(collection(db, `centres/${centreId}/years`)), { name, active: yearsList.length === 0, createdAt: new Date() }); await loadYearsAndActive(); showToast("Année créée"); }

    // Modal générique
    function openModal(title, fields, onSubmit) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        let html = `<div class="modal-content"><h3>${title}</h3>`;
        fields.forEach(f => { html += `<label>${f.label}</label><input type="${f.type || 'text'}" id="modal_${f.id}" value="${f.value || ''}">`; });
        html += `<div class="flex-between" style="margin-top:1rem;"><button id="modalCancel" class="btn btn-outline">Annuler</button><button id="modalConfirm" class="btn">Confirmer</button></div></div>`;
        modalDiv.innerHTML = html;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#modalCancel').onclick = () => modalDiv.remove();
        modalDiv.querySelector('#modalConfirm').onclick = async () => {
            const data = {};
            fields.forEach(f => { data[f.id] = document.getElementById(`modal_${f.id}`).value; });
            modalDiv.remove();
            await onSubmit(data);
        };
    }

    // ========== FICHE D'INFORMATION DU CENTRE ==========
    async function checkCentreInfo() {
        if (currentUserRole !== 'centre') return true;
        const infoDoc = await getDoc(doc(db, `centres/${currentCentreId || currentUser.uid}/infos`, 'details'));
        if (!infoDoc.exists()) {
            // Afficher le formulaire de configuration
            showCentreInfoForm();
            return false;
        }
        return true;
    }

    function showCentreInfoForm() {
        document.getElementById('appContainer').innerHTML = `
            <div class="flex-between"><h1>Configuration du centre</h1><button id="logoutBtn" class="btn btn-sm btn-outline">Déconnexion</button></div>
            <div class="card">
                <h3>Informations légales et adresse</h3>
                <label>Dénomination</label><input type="text" id="denomination" placeholder="Nom du centre">
                <label>Adresse</label><input type="text" id="address" placeholder="Adresse complète">
                <label>Coordonnées géographiques</label>
                <div id="map" style="height:250px; margin-bottom:0.5rem"></div>
                <input type="text" id="lat" placeholder="Latitude" readonly>
                <input type="text" id="lng" placeholder="Longitude" readonly>
                <label>ICE (facultatif)</label><input type="text" id="ice">
                <label>PATENTE</label><input type="text" id="patente">
                <label>CNSS</label><input type="text" id="cnss">
                <label>RC</label><input type="text" id="rc">
                <button id="saveCentreInfoBtn" class="btn" style="margin-top:1rem">Enregistrer</button>
            </div>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        // Initialiser la carte
        map = L.map('map').setView([33.5731, -7.5898], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(map);
        map.on('click', (e) => {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });
        document.getElementById('saveCentreInfoBtn').onclick = async () => {
            const data = {
                denomination: document.getElementById('denomination').value,
                address: document.getElementById('address').value,
                lat: parseFloat(document.getElementById('lat').value) || null,
                lng: parseFloat(document.getElementById('lng').value) || null,
                ice: document.getElementById('ice').value,
                patente: document.getElementById('patente').value,
                cnss: document.getElementById('cnss').value,
                rc: document.getElementById('rc').value,
                updatedAt: new Date()
            };
            await setDoc(doc(db, `centres/${currentCentreId || currentUser.uid}/infos`, 'details'), data);
            showToast("Informations enregistrées");
            buildAppUI(); // Recharge l'interface centre
        };
    }    // ========== FONCTIONS DE RENDU POUR LE CENTRE ==========
    async function renderDashboard() {
        if (!activeYearId) { document.getElementById('dashboardPanel').innerHTML = '<div class="card">Sélectionnez ou créez une année scolaire</div>'; return; }
        loading(true);
        const payments = await getPayments(), expenses = await getExpenses(), students = await getStudents();
        const totalRev = payments.reduce((a,b)=>a+Number(b.amount),0);
        const totalExp = expenses.reduce((a,b)=>a+Number(b.amount),0);
        const profit = totalRev - totalExp;
        const levels = ['Primaire','Collège','Lycée','Supérieur'];
        const levelStats = levels.map(l => payments.filter(p=>p.level===l).reduce((a,b)=>a+Number(b.amount),0));
        let html = `<div class="flex-between"><h2>Tableau de bord</h2><button id="exportCSVBtn" class="btn btn-sm btn-outline">Export CSV</button></div>
        <div class="grid-2"><div class="card"><h3>💰 Revenus</h3><div class="stat-number">${totalRev} DH</div></div><div class="card"><h3>📉 Dépenses</h3><div class="stat-number">${totalExp} DH</div></div><div class="card"><h3>📈 Bénéfice</h3><div class="stat-number">${profit} DH</div></div><div class="card"><h3>👩‍🎓 Élèves</h3><div class="stat-number">${students.length}</div></div></div>
        <div class="card"><canvas id="levelChart"></canvas></div>`;
        document.getElementById('dashboardPanel').innerHTML = html;
        const canvas = document.getElementById('levelChart');
        if (canvas && currentChart) currentChart.destroy();
        if (canvas) currentChart = new Chart(canvas, { type: 'bar', data: { labels: levels, datasets: [{ label: 'Paiements (DH)', data: levelStats, backgroundColor: '#6366F1' }] } });
        document.getElementById('exportCSVBtn')?.addEventListener('click', () => { let csv = "Type,Valeur\nRevenus,"+totalRev+"\nDépenses,"+totalExp+"\nBénéfice,"+profit+"\nÉlèves,"+students.length; const blob = new Blob([csv], {type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="dashboard.csv"; a.click(); });
        loading(false);
    }

    async function renderStudents() {
        let students = await getStudents(), parents = await getParents();
        const parentMap = Object.fromEntries(parents.map(p=>[p.id, p.name]));
        let html = `<div class="flex-between"><h2>Élèves</h2><button id="addStudentBtn" class="btn"><i class="fas fa-plus"></i> Ajouter</button></div>
        <input type="text" id="searchStudent" placeholder="Rechercher...">
        <div class="card"><div class="table-wrapper">能able><thead><tr><th>Nom</th><th>Niveau</th><th>Téléphone</th><th>Parent</th><th>Actions</th></tr></thead><tbody>
            ${students.map(s => `<tr>
                <td>${s.fullName}</td>
                <td>${s.level}</td>
                <td>${s.phone||''}</td>
                <td>${parentMap[s.parentId]||'—'}</td>
                <td>
                    <button data-id="${s.id}" class="editStudentBtn btn-sm btn-outline"><i class="fas fa-edit"></i></button>
                    <button data-id="${s.id}" class="deleteStudentBtn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                    <button data-id="${s.id}" class="createStudentAccountBtn btn-sm btn-outline"><i class="fas fa-user-plus"></i> Créer compte</button>
                </td>
            </tr>`).join('')}
        </tbody></table></div></div>`;
        document.getElementById('studentsPanel').innerHTML = html;
        document.getElementById('addStudentBtn')?.addEventListener('click', () => openModal("Ajouter élève", [{id:"name",label:"Nom"},{id:"level",label:"Niveau"},{id:"phone",label:"Téléphone"},{id:"parentId",label:"ID Parent"}], async (data)=>{ await setDoc(doc(getSubCol('eleves')),{fullName:data.name,level:data.level,phone:data.phone,parentId:data.parentId}); showToast("Ajouté"); renderStudents(); }));
        document.querySelectorAll('.editStudentBtn').forEach(btn=>btn.addEventListener('click',async()=>{ let s=(await getStudents()).find(s=>s.id===btn.dataset.id); openModal("Modifier élève",[{id:"name",label:"Nom",value:s.fullName},{id:"level",label:"Niveau",value:s.level},{id:"phone",label:"Téléphone",value:s.phone},{id:"parentId",label:"Parent ID",value:s.parentId}],async(data)=>{ await setDoc(doc(getSubCol('eleves'),btn.dataset.id),{fullName:data.name,level:data.level,phone:data.phone,parentId:data.parentId}); showToast("Modifié"); renderStudents(); }); }));
        document.querySelectorAll('.deleteStudentBtn').forEach(btn=>btn.addEventListener('click',async()=>{ if(confirm("Supprimer ?")){ await deleteDoc(doc(getSubCol('eleves'),btn.dataset.id)); showToast("Supprimé"); renderStudents(); } }));
        document.querySelectorAll('.createStudentAccountBtn').forEach(btn=>btn.addEventListener('click', async () => {
            let studentId = btn.dataset.id;
            let student = (await getStudents()).find(s=>s.id===studentId);
            let email = prompt("Email pour l'élève (ex: "+student.fullName.replace(/\s/g,'').toLowerCase()+"@exemple.com)");
            if(!email) return;
            let password = prompt("Mot de passe (laisser vide pour 'student123')", "student123");
            if(!password) password = "student123";
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, `centres/${currentCentreId || currentUser.uid}/studentAccounts`, userCred.user.uid), { email, studentId, createdAt: new Date() });
                await setDoc(doc(db, 'users', userCred.user.uid), { email, role: 'student', centreId: currentCentreId || currentUser.uid, createdAt: new Date() });
                showToast(`Compte élève créé. Mot de passe: ${password}`);
            } catch(e) { showToast(e.message, "error"); }
        }));
    }

    async function renderParents() {
        let parents = await getParents(), students = await getStudents();
        let childrenMap = {};
        students.forEach(s=>{ if(s.parentId) childrenMap[s.parentId] = [...(childrenMap[s.parentId]||[]), s.fullName]; });
        let html = `<div class="flex-between"><h2>Parents</h2><button id="addParentBtn" class="btn"><i class="fas fa-plus"></i> Ajouter</button></div>
        <div class="card"><div class="table-wrapper">能able><thead><tr><th>Nom</th><th>Téléphone</th><th>Enfants</th><th>Actions</th></td></thead><tbody>
            ${parents.map(p=>`<tr>
                <td>${p.name}</td>
                <td>${p.phone||''}</td>
                <td>${childrenMap[p.id]?.join(', ')||'aucun'}</td>
                <td><button data-id="${p.id}" class="editParentBtn btn-sm btn-outline"><i class="fas fa-edit"></i></button> <button data-id="${p.id}" class="deleteParentBtn btn-sm btn-danger"><i class="fas fa-trash"></i></button></td>
            </tr>`).join('')}
        </tbody></table></div></div>`;
        document.getElementById('parentsPanel').innerHTML = html;
        document.getElementById('addParentBtn')?.addEventListener('click',()=>openModal("Ajouter parent",[{id:"name",label:"Nom"},{id:"phone",label:"Téléphone"}],async(data)=>{ await setDoc(doc(getSubCol('parents')),{name:data.name,phone:data.phone}); showToast("Ajouté"); renderParents(); }));
        document.querySelectorAll('.editParentBtn').forEach(btn=>btn.addEventListener('click',async()=>{ let p=(await getParents()).find(p=>p.id===btn.dataset.id); openModal("Modifier parent",[{id:"name",label:"Nom",value:p.name},{id:"phone",label:"Téléphone",value:p.phone}],async(data)=>{ await setDoc(doc(getSubCol('parents'),btn.dataset.id),{name:data.name,phone:data.phone}); showToast("Modifié"); renderParents(); }); }));
        document.querySelectorAll('.deleteParentBtn').forEach(btn=>btn.addEventListener('click',async()=>{ if(confirm("Supprimer ?")){ await deleteDoc(doc(getSubCol('parents'),btn.dataset.id)); showToast("Supprimé"); renderParents(); } }));
    }

    async function renderPayments() {
        let payments = await getPayments(), students = await getStudents();
        let studentMap = Object.fromEntries(students.map(s=>[s.id,s.fullName]));
        let levelsGroup = {};

            let timeSlot = prompt("Créneau (ex: 14h-16h)");
            if (profId && date && timeSlot) {
                await setDoc(doc(collection(db, `centres/${currentCentreId}/reservations`)), { studentId: linkedStudentIds[0], profId, date, timeSlot, status: 'en attente', parentEmail: currentUser.email });
                await addNotification(`Nouvelle réservation de ${currentUser.email} pour le ${date}`);
                showToast("Réservation envoyée");
                renderParentDashboard();
            }
        });
    }

    function buildParentUI() {
        document.getElementById('appContainer').innerHTML = `
            <div class="flex-between" style="margin-bottom:1rem"><h1><i class="fas fa-graduation-cap"></i> Espace Parent</h1><div><button id="logoutBtn" class="btn btn-sm btn-outline">Déconnexion</button></div></div>
            <div id="parentDashboardPanel" class="panel active-panel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        loadYearsAndActive().then(() => renderParentDashboard());
    }

    // ========== INTERFACE ÉLÈVE ==========
    async function renderStudentDashboard() {
        const studentDoc = await getDoc(doc(db, `centres/${currentCentreId}/studentAccounts`, currentUser.uid));
        if (!studentDoc.exists()) { showToast("Erreur: compte élève non lié"); return; }
        const studentId = studentDoc.data().studentId;
        const student = (await getStudents()).find(s => s.id === studentId);
        const notes = (await getNotes()).filter(n => n.studentId === studentId);
        const attendance = (await getAttendance()).filter(a => a.studentId === studentId);
        const scheduleSnap = await getDocs(getSubCol('schedule'));
        const schedule = scheduleSnap.docs.map(d => d.data()).filter(s => s.level === student?.level);
        let html = `<div class="card"><h3>Mon profil</h3><p>${student?.fullName} (${student?.level})</p></div>
        <div class="card"><h3>Mes notes</h3><div class="table-wrapper">能able>${notes.map(n => `<tr><td>${n.subject} - ${n.grade}/20 (${n.term})</td></tr>`).join('')}</table></div></div>
        <div class="card"><h3>Mes présences</h3><div class="table-wrapper">能able>${attendance.map(a => `<tr><td>${a.date} - ${a.status}</td></tr>`).join('')}</table></div></div>
        <div class="card"><h3>Emploi du temps</h3>${schedule.map(s => `<div>${s.day} ${s.timeSlot} - ${s.subject}</div>`).join('')}</div>`;
        document.getElementById('studentDashboardPanel').innerHTML = html;
    }

    function buildStudentUI() {
        document.getElementById('appContainer').innerHTML = `
            <div class="flex-between" style="margin-bottom:1rem"><h1><i class="fas fa-graduation-cap"></i> Espace Élève</h1><div><button id="logoutBtn" class="btn btn-sm btn-outline">Déconnexion</button></div></div>
            <div id="studentDashboardPanel" class="panel active-panel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        loadYearsAndActive().then(() => renderStudentDashboard());
    }

    // ========== INTERFACE SUPER-ADMIN ==========
    async function renderSuperAdminDashboard() {
        // Récupérer tous les centres (document users avec role centre)
        const usersSnap = await getDocs(collection(db, 'users'));
        const centres = usersSnap.docs.filter(d => d.data().role === 'centre').map(d => ({ uid: d.id, ...d.data() }));
        let html = `<h2>Gestion des centres</h2><div class="card"><div class="table-wrapper">能able><thead><tr><th>Email</th><th>Date création</th><th>Actions</th></tr></thead><tbody>
            ${centres.map(c => `<tr>
                <td>${c.email}</td>
                <td>${c.createdAt?.toDate?.().toLocaleDateString() || 'N/A'}</td>
                <td><button class="viewCentreBtn" data-uid="${c.uid}">Voir détails</button> <button class="deleteCentreBtn" data-uid="${c.uid}">Supprimer</button></td>
            </tr>`).join('')}
        </tbody></table></div></div>`;
        document.getElementById('superAdminPanel').innerHTML = html;
        document.querySelectorAll('.viewCentreBtn').forEach(btn => btn.addEventListener('click', async () => {
            const centreId = btn.dataset.uid;
            // Afficher les infos du centre (on peut ouvrir une modale)
            const infoDoc = await getDoc(doc(db, `centres/${centreId}/infos`, 'details'));
            const info = infoDoc.exists() ? infoDoc.data() : {};
            alert(`Centre: ${info.denomination || 'N/A'}\nAdresse: ${info.address || 'N/A'}\nICE: ${info.ice || ''}\nPATENTE: ${info.patente || ''}`);
        }));
        document.querySelectorAll('.deleteCentreBtn').forEach(btn => btn.addEventListener('click', async () => {
            if(confirm("Supprimer définitivement ce centre ?")) {
                // Supprimer l'utilisateur (nécessite fonction cloud) - ici on se contente de supprimer le document users
                await deleteDoc(doc(db, 'users', btn.dataset.uid));
                showToast("Centre supprimé (compte utilisateur restant)");
                renderSuperAdminDashboard();
            }
        }));
    }

    function buildSuperAdminUI() {
        document.getElementById('appContainer').innerHTML = `
            <div class="flex-between" style="margin-bottom:1rem"><h1><i class="fas fa-crown"></i> Super Admin</h1><div><button id="logoutBtn" class="btn btn-sm btn-outline">Déconnexion</button></div></div>
            <div id="superAdminPanel" class="panel active-panel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        renderSuperAdminDashboard();
    }

    // ========== INTERFACE CENTRE (principale) ==========
    function buildAppUI() {
        document.getElementById('appContainer').innerHTML = `
            <div class="flex-between"><h1><i class="fas fa-graduation-cap"></i> Centre Astuces</h1><div><div class="notification-icon" id="notifIcon"><i class="fas fa-bell"></i><span id="notifBadge" class="notification-badge"></span></div><button id="logoutBtn" class="btn btn-sm btn-outline">Déconnexion</button></div></div>
            <div class="flex-between"><div><strong>Année active :</strong> <span id="activeYearLabel">-</span></div><div><button id="manageYearsBtn" class="btn btn-sm">Gérer années</button><button id="backupExportBtn" class="btn btn-sm btn-outline">JSON</button><button id="backupImportBtn" class="btn btn-sm btn-outline">Importer</button></div></div>
            <div class="bottom-nav">
                <button class="nav-item" data-panel="dashboard"><i class="fas fa-chart-line"></i><span>Dashboard</span></button>
                <button class="nav-item" data-panel="students"><i class="fas fa-user-graduate"></i><span>Élèves</span></button>
                <button class="nav-item" data-panel="parents"><i class="fas fa-users"></i><span>Parents</span></button>
                <button class="nav-item" data-panel="payments"><i class="fas fa-coins"></i><span>Paiements</span></button>
                <button class="nav-item" data-panel="profs"><i class="fas fa-chalkboard"></i><span>Professeurs</span></button>
                <button class="nav-item" data-panel="expenses"><i class="fas fa-receipt"></i><span>Dépenses</span></button>
                <button class="nav-item" data-panel="schedule"><i class="fas fa-calendar-week"></i><span>Emploi</span></button>
                <button class="nav-item" data-panel="planning"><i class="fas fa-calendar-check"></i><span>Réservations</span></button>
                <button class="nav-item" data-panel="invoices"><i class="fas fa-file-invoice"></i><span>Factures</span></button>
                <button class="nav-item" data-panel="attendance"><i class="fas fa-check-circle"></i><span>Présences</span></button>
                <button class="nav-item" data-panel="grades"><i class="fas fa-star"></i><span>Notes</span></button>
                <button class="nav-item" data-panel="parentPortal"><i class="fas fa-users"></i><span>Espace parent</span></button>
            </div>
            <div id="dashboardPanel" class="panel"></div><div id="studentsPanel" class="panel"></div><div id="parentsPanel" class="panel"></div>
            <div id="paymentsPanel" class="panel"></div><div id="profsPanel" class="panel"></div><div id="expensesPanel" class="panel"></div>
            <div id="schedulePanel" class="panel"></div><div id="planningPanel" class="panel"></div><div id="invoicesPanel" class="panel"></div>
            <div id="attendancePanel" class="panel"></div><div id="gradesPanel" class="panel"></div><div id="parentPortalPanel" class="panel"></div>
        `;
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        document.getElementById('manageYearsBtn').onclick = openYearModal;
        document.getElementById('backupExportBtn').onclick = async () => { if(!activeYearId) return; const data={students:await getStudents(),parents:await getParents(),payments:await getPayments(),profs:await getProfs(),expenses:await getExpenses(),schedule:(await getDocs(getSubCol('schedule'))).docs.map(d=>d.data()),attendance:await getAttendance(),notes:await getNotes()}; const blob=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`backup_${activeYearId}.json`; a.click(); };
        const importInput = document.createElement('input'); importInput.type='file'; importInput.accept='application/json';
        document.getElementById('backupImportBtn').onclick = () => importInput.click();
        importInput.onchange = async (e) => { const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=async (ev)=>{ const data=JSON.parse(ev.target.result); const batch=writeBatch(db); const centreId = currentCentreId || currentUser.uid; for(let s of data.students||[]){ batch.set(doc(getSubCol('eleves')),s); } for(let p of data.parents||[]) batch.set(doc(getSubCol('parents')),p); for(let pay of data.payments||[]) batch.set(doc(getSubCol('paiements')),pay); for(let pr of data.profs||[]) batch.set(doc(getSubCol('profs')),pr); for(let exp of data.expenses||[]) batch.set(doc(getSubCol('depenses')),exp); for(let sch of data.schedule||[]) batch.set(doc(getSubCol('schedule')),sch); for(let att of data.attendance||[]) batch.set(doc(collection(db,`centres/${centreId}/attendance`)),att); for(let note of data.notes||[]) batch.set(doc(collection(db,`centres/${centreId}/notes`)),note); await batch.commit(); showToast("Importé"); refreshCurrentPanel(); }; reader.readAsText(file); };
        document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => showPanel(btn.dataset.panel)));
        loadYearsAndActive().then(() => showPanel('dashboard'));
        setInterval(async () => { if(currentUser){ let notifs = await getNotifications(); let unread = notifs.filter(n=>!n.read).length; if(unread>0) showToast(`Vous avez ${unread} notification(s)`); updateNotificationBadge(); } }, 60000);
        document.getElementById('notifIcon')?.addEventListener('click', async () => { let notifs = await getNotifications(); let msg = notifs.filter(n=>!n.read).map(n=>n.message).join('\n'); alert(msg || "Aucune notification"); for(let n of notifs.filter(n=>!n.read)) await updateDoc(doc(db,`centres/${currentCentreId || currentUser.uid}/notifications`,n.id),{read:true}); updateNotificationBadge(); });
    }

    // ========== AUTHENTIFICATION ==========
    function renderAuth() {
        document.getElementById('authWrapper').innerHTML = `<div class="auth-card"><h2>Centre Astuces</h2><div id="authTabs" class="flex-between"><button id="showLoginBtn" class="btn btn-outline">Connexion</button><button id="showSignupBtn" class="btn btn-outline">Inscription</button></div><div id="loginForm"><input id="loginEmail" placeholder="Email"><input id="loginPassword" type="password" placeholder="Mot de passe"><button id="doLoginBtn" class="btn">Se connecter</button></div><div id="signupForm" style="display:none"><input id="signupEmail" placeholder="Email"><input id="signupPassword" type="password" placeholder="Mot de passe"><button id="doSignupBtn" class="btn">Créer mon centre</button></div></div>`;
        document.getElementById('showLoginBtn').onclick = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('signupForm').style.display='none'; };
        document.getElementById('showSignupBtn').onclick = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('signupForm').style.display='block'; };
        document.getElementById('doLoginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value).catch(e=>showToast(e.message,'error'));
        document.getElementById('doSignupBtn').onclick = async () => {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', userCred.user.uid), { email, role: 'centre', createdAt: new Date() });
                showToast("Centre créé ! Veuillez vous connecter.");
            } catch(e) { showToast(e.message, 'error'); }
        };
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            const role = userDoc.exists() ? userDoc.data().role : 'centre';
            currentUserRole = role;
            if (role === 'parent') {
                currentCentreId = userDoc.data().centreId;
                document.getElementById('authWrapper').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                buildParentUI();
            } else if (role === 'student') {
                currentCentreId = userDoc.data().centreId;
                document.getElementById('authWrapper').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                buildStudentUI();
            } else if (role === 'superadmin') {
                currentCentreId = null;
                document.getElementById('authWrapper').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                buildSuperAdminUI();
            } else { // centre
                currentCentreId = user.uid;
                document.getElementById('authWrapper').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                // Vérifier si les infos du centre sont remplies
                const infoDoc = await getDoc(doc(db, `centres/${currentCentreId}/infos`, 'details'));
                if (!infoDoc.exists()) {
                    showCentreInfoForm();
                } else {
                    buildAppUI();
                }
            }
        } else {
            currentUser = null;
            document.getElementById('authWrapper').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            renderAuth();
        }
    });
    renderAuth();
</script>
</body>
</html>
